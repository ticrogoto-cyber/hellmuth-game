# trigger: 2026-07-05 consolidation analysis
name: Konsolidierung Higgsfield Branches

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/konsolidierung.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hellmuth-game
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate KONSOLIDIERUNG.md
        shell: bash
        env:
          SOURCE_REPO: https://github.com/ticrogoto-cyber/Higgsfield-.git
          BASE_BRANCH: claude/quirky-fermat-8rewv0
          SINCE_DATE: '2026-06-05T00:00:00+00:00'
        run: |
          set -euo pipefail
          rm -rf /tmp/higgsfield-source
          git clone --filter=blob:none --no-checkout "$SOURCE_REPO" /tmp/higgsfield-source
          git -C /tmp/higgsfield-source fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

          python3 <<'PY'
          from __future__ import annotations

          import hashlib
          import os
          import subprocess
          from dataclasses import dataclass
          from datetime import datetime, timezone
          from pathlib import Path

          source_dir = Path('/tmp/higgsfield-source')
          target_dir = Path.cwd()
          base_branch = os.environ['BASE_BRANCH']
          base_ref = f'origin/{base_branch}'
          since = datetime.fromisoformat(os.environ['SINCE_DATE'])

          out_of_scope_prefixes = (
              'hellmuth/node_modules/',
              'hellmuth/dist/',
              'hellmuth/proof/',
              'hellmuth/proof3d/',
          )

          @dataclass
          class DiffRow:
              status: str
              paths: list[str]

              @property
              def current_path(self) -> str:
                  return self.paths[-1] if self.paths else ''

              def label(self) -> str:
                  return f"{self.status} {' -> '.join(self.paths)}"

          def git(args: list[str], cwd: Path = source_dir, check: bool = True, text: bool = True):
              result = subprocess.run(
                  ['git', '-C', str(cwd), *args],
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=text,
              )
              if check and result.returncode != 0:
                  raise RuntimeError(
                      f"git {' '.join(args)} failed\nSTDOUT:\n{result.stdout}\nSTDERR:\n{result.stderr}"
                  )
              return result.stdout

          def git_bytes(args: list[str], cwd: Path = source_dir) -> bytes | None:
              result = subprocess.run(
                  ['git', '-C', str(cwd), *args],
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if result.returncode != 0:
                  return None
              return result.stdout

          def parse_dt(value: str) -> datetime:
              return datetime.fromisoformat(value.strip().replace('Z', '+00:00'))

          def md(value: object) -> str:
              text = str(value)
              return text.replace('|', '\\|').replace('\n', '<br>')

          def parse_diff(output: str) -> list[DiffRow]:
              rows: list[DiffRow] = []
              for line in output.splitlines():
                  parts = line.split('\t')
                  if len(parts) < 2:
                      continue
                  rows.append(DiffRow(status=parts[0], paths=parts[1:]))
              return rows

          def is_out_of_scope(path: str) -> bool:
              return path.startswith(out_of_scope_prefixes)

          def map_to_target(path: str) -> Path | None:
              if not path.startswith('hellmuth/'):
                  return None
              if is_out_of_scope(path):
                  return None
              return target_dir / path.removeprefix('hellmuth/')

          def source_blob(ref: str, path: str) -> bytes | None:
              return git_bytes(['show', f'{ref}:{path}'])

          def same_hash(left: bytes, right: bytes) -> bool:
              return hashlib.sha256(left).digest() == hashlib.sha256(right).digest()

          def file_contained(ref: str, row: DiffRow) -> bool:
              path = row.current_path
              target_path = map_to_target(path)
              if target_path is None:
                  return True
              if row.status.startswith('D'):
                  return not target_path.exists()
              if not target_path.exists() or not target_path.is_file():
                  return False
              src = source_blob(ref, path)
              if src is None:
                  return False
              return same_hash(src, target_path.read_bytes())

          def area_summary(paths: list[str]) -> str:
              areas: list[str] = []
              def add(name: str) -> None:
                  if name not in areas:
                      areas.append(name)
              for path in paths:
                  rel = path.removeprefix('hellmuth/')
                  if rel.startswith('src/audio') or '/audio' in rel.lower() or 'audio' in rel.lower():
                      add('Audio/Sound')
                  if rel.startswith('src/editor') or 'editor' in rel.lower():
                      add('Editor/Tools')
                  if rel.startswith('src/scenes'):
                      add('Phaser-Szenen')
                  if rel.startswith('src/ui') or 'hud' in rel.lower():
                      add('HUD/UI')
                  if rel.startswith('src/vfx') or 'vfx' in rel.lower() or 'effect' in rel.lower():
                      add('VFX/Animationen')
                  if rel.startswith('assets'):
                      add('Assets/Sprites/Sounds/Maps')
                  if rel.startswith('docs'):
                      add('Dokumentation')
                  if rel.startswith('.github'):
                      add('CI/GitHub Actions')
                  if rel.startswith('package') or rel in {'tsconfig.json', 'vite.config.ts', 'index.html'}:
                      add('Build/Projektkonfiguration')
                  if rel.startswith('game/data') or rel.startswith('data') or '/data/' in rel:
                      add('Spieldaten/Maps')
                  if rel.startswith('src'):
                      add('Spielcode')
                  if rel.startswith('proof') or rel.startswith('proof3d'):
                      add('Proof/Demo (nicht direkt importrelevant)')
              return ', '.join(areas) if areas else 'keine hellmuth-relevanten Dateien'

          def recommendation(recent: bool, contained: bool, relevant_count: int, out_of_scope_count: int) -> str:
              if contained:
                  return 'Nein - bereits im Zielstand oder ohne relevante Abweichung.'
              if relevant_count == 0 and out_of_scope_count > 0:
                  return 'Nein fuer direkten Merge - nur out-of-scope Proof/Build-Artefakte pruefen.'
              if recent:
                  return 'Ja, gezielt pruefen/portieren; nicht automatisch mergen.'
              return 'Spaeter pruefen; aelter, aber nicht im Zielstand enthalten.'

          def short_list(items: list[str], limit: int = 80) -> tuple[list[str], int]:
              if len(items) <= limit:
                  return items, 0
              return items[:limit], len(items) - limit

          if not git(['rev-parse', '--verify', base_ref], check=False).strip():
              raise RuntimeError(f'Basis-Branch nicht gefunden: {base_ref}')

          raw_refs = git(['for-each-ref', '--format=%(refname:short)', 'refs/remotes/origin']).splitlines()
          branch_names = sorted(
              ref.removeprefix('origin/') for ref in raw_refs
              if ref and ref != 'origin/HEAD' and ref.startswith('origin/')
          )

          rows = []
          for branch in branch_names:
              ref = f'origin/{branch}'
              last_date = parse_dt(git(['log', '-1', '--format=%cI', ref]))
              message = git(['log', '-1', '--format=%s', ref]).strip()
              short_sha = git(['rev-parse', '--short=12', ref]).strip()
              recent = last_date >= since
              diff_rows = parse_diff(git(['diff', '--name-status', base_ref, ref, '--', 'hellmuth']))
              relevant_rows = [r for r in diff_rows if not is_out_of_scope(r.current_path)]
              out_scope_rows = [r for r in diff_rows if is_out_of_scope(r.current_path)]
              uncontained_rows = [r for r in relevant_rows if not file_contained(ref, r)]
              branch_is_base = branch == base_branch
              if branch_is_base:
                  contained = True
                  contained_label = 'Ja - Import-Basis von hellmuth-game'
              elif not relevant_rows:
                  contained = True
                  contained_label = 'Ja/irrelevant - keine importrelevanten hellmuth-Aenderungen'
              elif not uncontained_rows:
                  contained = True
                  contained_label = 'Ja - relevanter Dateistand ist in hellmuth-game/main vorhanden'
              else:
                  contained = False
                  contained_label = 'Nein - relevante hellmuth-Dateien unterscheiden sich'

              source_log_all = git(['log', '--oneline', f'{base_ref}..{ref}', '--', 'hellmuth'], check=False).splitlines()
              source_log_relevant = []
              for line in source_log_all:
                  if line.strip():
                      source_log_relevant.append(line.strip())
              paths = [r.current_path for r in diff_rows]
              rows.append({
                  'branch': branch,
                  'ref': ref,
                  'last_date': last_date,
                  'message': message,
                  'short_sha': short_sha,
                  'recent': recent,
                  'diff_rows': diff_rows,
                  'relevant_rows': relevant_rows,
                  'out_scope_rows': out_scope_rows,
                  'uncontained_rows': uncontained_rows,
                  'contained': contained,
                  'contained_label': contained_label,
                  'areas': area_summary(paths),
                  'source_log': source_log_relevant,
                  'recommendation': recommendation(recent, contained, len(relevant_rows), len(out_scope_rows)),
              })

          rows.sort(key=lambda r: r['last_date'], reverse=True)
          total = len(rows)
          recent_count = sum(1 for r in rows if r['recent'])
          recent_uncontained = [r for r in rows if r['recent'] and not r['contained']]
          old_uncontained = [r for r in rows if not r['recent'] and not r['contained']]
          generated = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          target_head = git(['rev-parse', '--short=12', 'HEAD'], cwd=target_dir).strip()
          target_recent_log = git(['log', '--oneline', '--max-count=12'], cwd=target_dir).splitlines()

          lines: list[str] = []
          lines.append('# KONSOLIDIERUNG')
          lines.append('')
          lines.append(f'Erstellt: {generated}')
          lines.append('')
          lines.append('Quelle: `ticrogoto-cyber/Higgsfield-`')
          lines.append('Ziel: `ticrogoto-cyber/hellmuth-game`, Branch `main`')
          lines.append(f'Import-Basis laut Auftrag: `Higgsfield-/{base_branch}`')
          lines.append('Analysefenster fuer "letzter Monat": Commits ab `2026-06-05` bis `2026-07-05`.')
          lines.append('')
          lines.append('## Methode')
          lines.append('')
          lines.append('- Alle Remote-Branches aus `Higgsfield-` wurden gelesen und nach letztem Commit sortiert.')
          lines.append('- Fuer aktuelle Branches wurde der Git-Log gegen die Import-Basis mit `git log --oneline origin/claude/quirky-fermat-8rewv0..origin/<branch> -- hellmuth` geprueft.')
          lines.append('- Weil `hellmuth-game` als selektiver Import eigene Commits hat, koennen Quell-Commit-SHAs nicht 1:1 im Ziel-Log auftauchen. Deshalb wurde zusaetzlich der Dateistand relevanter `hellmuth/`-Dateien gegen `hellmuth-game/main` verglichen.')
          lines.append('- Ignoriert fuer die Merge-Empfehlung: `hellmuth/node_modules/`, `hellmuth/dist/`, `hellmuth/proof/`, `hellmuth/proof3d/`. Diese Pfade werden als out-of-scope markiert, falls sie vorkommen.')
          lines.append('')
          lines.append('## Kurzfazit')
          lines.append('')
          lines.append(f'- Branches gesamt: **{total}**')
          lines.append(f'- Branches mit Commit seit 2026-06-05: **{recent_count}**')
          lines.append(f'- Aktuelle Branches mit nicht enthaltenen relevanten Aenderungen: **{len(recent_uncontained)}**')
          lines.append(f'- Aeltere Branches mit nicht enthaltenen relevanten Aenderungen: **{len(old_uncontained)}**')
          lines.append(f'- Ziel-HEAD waehrend der Analyse: `{target_head}`')
          lines.append('')
          lines.append('Letzte Zielrepo-Commits zum Abgleich:')
          for log_line in target_recent_log:
              lines.append(f'- `{log_line}`')
          lines.append('')
          lines.append('## Gesamtuebersicht aller Branches')
          lines.append('')
          lines.append('| Branch | Letzter Commit | Head | Message | Im letzten Monat | Enthalten in hellmuth-game/main | Empfehlung |')
          lines.append('|---|---:|---|---|---:|---|---|')
          for r in rows:
              lines.append(
                  f"| `{md(r['branch'])}` | {r['last_date'].strftime('%Y-%m-%d %H:%M %z')} | `{r['short_sha']}` | {md(r['message'])} | {'Ja' if r['recent'] else 'Nein'} | {md(r['contained_label'])} | {md(r['recommendation'])} |"
              )
          lines.append('')
          lines.append('## Details: aktuelle nicht enthaltene Branches')
          lines.append('')
          if not recent_uncontained:
              lines.append('Keine aktuellen Branches mit relevanten, nicht enthaltenen Aenderungen gefunden.')
          for r in recent_uncontained:
              lines.append(f"### `{r['branch']}`")
              lines.append('')
              lines.append(f"- Letzter Commit: `{r['last_date'].strftime('%Y-%m-%d %H:%M %z')}` `{r['short_sha']}` - {r['message']}")
              lines.append(f"- Bereiche/Features: {r['areas']}")
              lines.append(f"- Status: {r['contained_label']}")
              lines.append(f"- Empfehlung: {r['recommendation']}")
              lines.append('')
              lines.append('Commits gegen Import-Basis:')
              if r['source_log']:
                  shown, omitted = short_list(r['source_log'], 30)
                  for log_line in shown:
                      lines.append(f'- `{log_line}`')
                  if omitted:
                      lines.append(f'- ... {omitted} weitere Commits')
              else:
                  lines.append('- Keine `hellmuth/`-Commits gegen die Import-Basis.')
              lines.append('')
              lines.append('Geaenderte Dateien gegen Import-Basis:')
              file_labels = [row.label() for row in r['diff_rows']]
              if file_labels:
                  shown, omitted = short_list(file_labels, 100)
                  for label in shown:
                      lines.append(f'- `{label}`')
                  if omitted:
                      lines.append(f'- ... {omitted} weitere Dateien')
              else:
                  lines.append('- Keine Datei-Differenz unter `hellmuth/`.')
              lines.append('')
          lines.append('## Aeltere nicht enthaltene Branches')
          lines.append('')
          if not old_uncontained:
              lines.append('Keine aelteren Branches mit relevanten, nicht enthaltenen Aenderungen gefunden.')
          else:
              lines.append('| Branch | Letzter Commit | Bereiche/Features | Empfehlung |')
              lines.append('|---|---:|---|---|')
              for r in old_uncontained:
                  lines.append(
                      f"| `{md(r['branch'])}` | {r['last_date'].strftime('%Y-%m-%d %H:%M %z')} | {md(r['areas'])} | {md(r['recommendation'])} |"
                  )
          lines.append('')
          lines.append('## Naechster sinnvoller Schritt')
          lines.append('')
          lines.append('Noch nichts mergen. Zuerst die oben markierten aktuellen Branches einzeln pruefen und pro Branch entscheiden, ob die Aenderungen als Patch/Cherry-Pick in `hellmuth-game` uebernommen werden sollen.')
          lines.append('')

          Path('KONSOLIDIERUNG.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Commit report and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/konsolidierung.yml
          git add KONSOLIDIERUNG.md .github/workflows/konsolidierung.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: Konsolidierungsanalyse Higgsfield-Branches"
          git push
